<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VAULT: APEX // N64 OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #030305;
    --glass-bg: rgba(15, 15, 20, 0.5);
    --glass-border: rgba(255, 255, 255, 0.1);
    --accent: #00f0ff;
    --accent-glow: rgba(0, 240, 255, 0.5);
    --n64-color: #00f0ff;
    --text-main: #ffffff;
    --text-muted: #8a8d98;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body, html {
    width: 100%; height: 100%;
    background-color: var(--bg-base);
    color: var(--text-main);
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
  }

  .grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: 
      linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    transform: perspective(500px) rotateX(60deg) translateY(100px) translateZ(-200px);
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove {
    0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
    100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
  }

  #dynamic-bg {
    position: fixed; inset: -10%; width: 120%; height: 120%;
    background-size: cover; background-position: center;
    filter: blur(80px) brightness(0.2) saturate(1.5);
    transition: background-image 0.8s ease, opacity 0.8s ease;
    z-index: 1; opacity: 0;
  }
  #dynamic-bg.active { opacity: 1; }

  #app { display: flex; flex-direction: column; height: 100%; position: relative; z-index: 10; }

  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.5rem 3rem; background: linear-gradient(rgba(0,0,0,0.8), transparent);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .logo {
    font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 1.8rem;
    letter-spacing: -0.05em; display: flex; align-items: center; gap: 8px;
  }
  .logo span { color: transparent; -webkit-text-stroke: 1px var(--text-main); }
  
  .toolbar { display: flex; gap: 1rem; align-items: center; }
  
  .search-bar {
    background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 0.6rem 1.2rem; color: #fff;
    font-family: 'Outfit', sans-serif; outline: none; width: 250px;
    transition: all 0.3s; backdrop-filter: blur(10px);
  }
  .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); width: 300px; }

  .btn-upload {
    background: var(--text-main); color: var(--bg-base); border: none;
    padding: 0.6rem 1.5rem; border-radius: 20px; font-weight: 800;
    cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
  }
  .btn-upload:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.4); }

  main { flex: 1; padding: 1rem 3rem 3rem; overflow-y: auto; overflow-x: hidden; }
  main::-webkit-scrollbar { width: 6px; }
  main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

  #drop-zone {
    border: 2px dashed rgba(255,255,255,0.15); border-radius: 24px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 60vh; text-align: center; cursor: pointer; transition: all 0.4s;
    margin-top: 2rem;
  }
  #drop-zone:hover, #drop-zone.dragover {
    border-color: var(--accent); background: rgba(0, 240, 255, 0.05); transform: translateY(-5px);
  }

  #library {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 2.5rem; perspective: 1000px; padding-top: 2rem;
  }

  .game-card {
    position: relative; aspect-ratio: 3/4; cursor: pointer;
    transform-style: preserve-3d; transition: transform 0.1s;
    animation: fadeIn 0.5s ease backwards;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  
  .game-card-inner {
    position: absolute; inset: 0; border-radius: 16px;
    background: #111; border: 1px solid var(--glass-border);
    overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .game-cover { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.4s; }
  .game-card:hover .game-cover { opacity: 1; transform: scale(1.05); }
  
  .badge {
    position: absolute; top: 12px; right: 12px; padding: 4px 10px; border-radius: 8px;
    font-size: 0.7rem; font-weight: 800; letter-spacing: 1px; backdrop-filter: blur(5px);
    color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    background: rgba(0, 240, 255, 0.3); border: 1px solid var(--n64-color);
  }

  .game-info {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem 1.2rem 1.2rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.95) 40%);
    transform: translateZ(30px); pointer-events: none;
  }
  .game-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.1rem; line-height: 1.2; text-shadow: 0 2px 4px #000; }
  
  .delete-btn {
    position: absolute; top: 12px; left: 12px; z-index: 20;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; transition: 0.2s;
  }
  .game-card:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: #ff2a5f; border-color: #ff2a5f; }

  #emu-screen {
    position: fixed; inset: 0; z-index: 2000; background: #000;
    display: none; flex-direction: column; opacity: 0; transition: opacity 0.4s;
  }
  #emu-screen.active { display: flex; opacity: 1; }
  
  .emu-nav {
    position: absolute; top: 0; left: 0; right: 0; height: 60px; z-index: 2010;
    background: linear-gradient(rgba(0,0,0,0.9), transparent);
    display: flex; justify-content: space-between; align-items: center; padding: 0 2rem;
    opacity: 0; transition: opacity 0.3s;
  }
  #emu-screen:hover .emu-nav { opacity: 1; }
  
  .close-btn { 
    background: rgba(255, 42, 95, 0.2); border: 1px solid #ff2a5f;
    color: #fff; padding: 0.5rem 1.5rem; border-radius: 8px; cursor: pointer;
    font-weight: 700; backdrop-filter: blur(5px); transition: 0.2s;
  }
  .close-btn:hover { background: #ff2a5f; }

  #loader {
    position: fixed; inset: 0; z-index: 3000; background: rgba(3,3,5,0.95); backdrop-filter: blur(20px);
    display: none; flex-direction: column; align-items: center; justify-content: center;
  }
  #loader.active { display: flex; }
  
  .core-spinner { position: relative; width: 100px; height: 100px; }
  .core-ring {
    position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent;
    animation: spinCore 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    border-top-color: var(--n64-color); border-bottom-color: var(--n64-color); 
    filter: drop-shadow(0 0 10px var(--n64-color));
  }
  .core-ring:nth-child(2) {
    animation-direction: reverse; width: 70%; height: 70%; top: 15%; left: 15%;
    border-top-color: #fff; border-bottom-color: #fff; filter: none;
  }
  
  @keyframes spinCore { 100% { transform: rotate(360deg); } }

  #controls-help {
    position: absolute; bottom: 16px; right: 16px; z-index: 2020;
    background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 10px 14px;
    font-size: 0.72rem; color: var(--text-muted); line-height: 1.8;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    backdrop-filter: blur(8px);
  }
  #emu-screen:hover #controls-help { opacity: 1; }
  #controls-help b { color: #fff; font-weight: 600; }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div id="dynamic-bg"></div>

<div id="app">
  <header>
    <div class="logo">VAULT:<span>APEX</span></div>
    <div class="toolbar">
      <input type="text" id="search-bar" class="search-bar" placeholder="Search Vault...">
      <button class="btn-upload" onclick="document.getElementById('file-input').click()">+ ADD ROM</button>
      <input type="file" id="file-input" style="display:none" accept=".n64,.z64,.v64,.zip" multiple>
    </div>
  </header>

  <main>
    <div id="drop-zone">
      <h2 style="font-size:2.5rem; margin-bottom:10px; text-shadow: 0 0 20px var(--accent-glow);">APEX ENGINE ACTIVE</h2>
      <p style="color:var(--text-muted); font-size:1.1rem;">Drag & Drop <b>N64</b> files (.n64, .z64, .v64, .zip) to expand vault.</p>
    </div>
    <div id="library" style="display:none;"></div>
  </main>
</div>

<div id="emu-screen">
  <div class="emu-nav">
    <div id="emu-title" style="font-weight:800; font-family:'Space Grotesk', sans-serif; font-size:1.2rem; letter-spacing:2px;"></div>
    <button class="close-btn" onclick="closeEmu()">TERMINATE LINK</button>
  </div>
  <div id="game-mount" style="flex:1; width:100%; height:100%;"></div>
  <div id="controls-help">
    <b>Keyboard Controls</b><br>
    Arrow Keys / WASD → Analog Stick<br>
    Z → A &nbsp;&nbsp; X → B &nbsp;&nbsp; C → Z Trigger<br>
    A → L &nbsp;&nbsp; S → R &nbsp;&nbsp; Enter → Start<br>
    1–4 → C-Buttons
  </div>
</div>

<div id="loader">
  <div class="core-spinner">
    <div class="core-ring"></div>
    <div class="core-ring"></div>
  </div>
  <p style="margin-top:2rem; font-weight:800; letter-spacing:4px; font-family:'Space Grotesk', sans-serif;" id="load-status">INITIALIZING CORE...</p>
</div>

<script>
let library = [];
let searchQuery = '';

const n64Art = "https://thumbnails.libretro.com/Nintendo%20-%20Nintendo%2064/Named_Boxarts/";

// Keeps known overrides for standard games, but fails gracefully for randomizers
const ROM_OVERRIDES = {
  'majora': { display: "The Legend of Zelda: Majora's Mask", art: "The Legend of Zelda - Majora's Mask" },
  'mmr':    { display: "The Legend of Zelda: Majora's Mask", art: "The Legend of Zelda - Majora's Mask" },
  'zelda majora': { display: "The Legend of Zelda: Majora's Mask", art: "The Legend of Zelda - Majora's Mask" },
  'ocarina': { display: "The Legend of Zelda: Ocarina of Time", art: "The Legend of Zelda - Ocarina of Time" },
  'mario 64': { display: "Super Mario 64", art: "Super Mario 64" },
};

function resolveRomMeta(filename) {
  const lower = filename.toLowerCase();
  for (const [key, val] of Object.entries(ROM_OVERRIDES)) {
    if (lower.includes(key)) return val;
  }
  // For Randomizers: Safely extract a readable display name from the gibberish file name
  const clean = filename.replace(/\.[^.]+$/, '').replace(/[_\-]+/g, ' ').trim();
  return { display: clean, art: clean };
}

const dropZone = document.getElementById('drop-zone');
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => document.body.addEventListener(ev, e => e.preventDefault()));
document.body.addEventListener('dragover', () => dropZone.classList.add('dragover'));
document.body.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
document.body.addEventListener('drop', e => { dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
document.getElementById('file-input').addEventListener('change', e => handleFiles(e.target.files));
dropZone.addEventListener('click', () => document.getElementById('file-input').click());

document.getElementById('search-bar').addEventListener('input', e => { searchQuery = e.target.value.toLowerCase(); renderLibrary(); });

function handleFiles(files) {
  Array.from(files).forEach(file => {
    const ext = file.name.toLowerCase().slice(file.name.lastIndexOf('.'));
    // STRICT N64 CHECK
    if (!['.n64','.z64','.v64','.zip'].includes(ext)) return;
    if (library.some(g => g.name === file.name)) return;
    const meta = resolveRomMeta(file.name);
    library.push({ file, name: file.name, ext, id: Date.now() + Math.random(), meta });
  });
  renderLibrary();
}

function renderLibrary() {
  const lib = document.getElementById('library');
  const drop = document.getElementById('drop-zone');
  
  if (library.length === 0) {
    drop.style.display = 'flex'; lib.style.display = 'none'; return;
  }
  
  drop.style.display = 'none'; lib.style.display = 'grid';
  lib.innerHTML = '';

  let filteredLib = library.filter(game => 
    game.meta.display.toLowerCase().includes(searchQuery) || game.name.toLowerCase().includes(searchQuery)
  );

  filteredLib.forEach((game, i) => {
    const { display, art } = game.meta;
    const artUrl = n64Art + encodeURIComponent(art + ' (USA)') + '.png';
    // Clean SVG fallback for randomizers
    const fallbackSvg = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='400'><rect width='100%' height='100%' fill='%23111'/><text x='50%' y='50%' fill='%2300f0ff' font-family='sans-serif' font-weight='bold' font-size='24' text-anchor='middle'>NO ART</text><text x='50%' y='60%' fill='%23555' font-family='sans-serif' font-size='12' text-anchor='middle'>CUSTOM ROM</text></svg>`;

    const card = document.createElement('div');
    card.className = 'game-card';
    card.style.animationDelay = `${i * 0.05}s`;
    
    card.innerHTML = `
      <div class="game-card-inner">
        <img class="game-cover" src="${artUrl}" onerror="this.src='${fallbackSvg}'">
        <div class="badge">N64</div>
        <div class="delete-btn" title="Remove ROM">✕</div>
        <div class="game-info">
          <div class="game-title">${display}</div>
        </div>
      </div>
    `;

    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left, y = e.clientY - rect.top;
      const rotateX = ((y - rect.height/2) / rect.height * 2) * -15;
      const rotateY = ((x - rect.width/2) / rect.width * 2) * 15;
      card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
      document.getElementById('dynamic-bg').style.backgroundImage = `url('${artUrl}')`;
      document.getElementById('dynamic-bg').classList.add('active');
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)`;
      document.getElementById('dynamic-bg').classList.remove('active');
    });

    card.addEventListener('click', e => {
      if (e.target.classList.contains('delete-btn')) {
        library = library.filter(g => g.id !== game.id);
        renderLibrary();
      } else {
        launch(game);
      }
    });

    lib.appendChild(card);
  });
}

let currentBlobUrl = null;

// Sandbox iframe listener
window.addEventListener('message', (e) => {
  if (e.data === 'emu-started') {
    setTimeout(() => {
      document.getElementById('loader').classList.remove('active');
      document.getElementById('emu-screen').classList.add('active');
    }, 800);
  }
});

function launch(game) {
  const loader = document.getElementById('loader');
  const mount = document.getElementById('game-mount');

  loader.classList.add('active');
  document.getElementById('load-status').textContent = 'INITIALIZING CORE...';
  document.getElementById('emu-title').innerHTML = `${game.meta.display.toUpperCase()} <span style="color:var(--accent)">// N64</span>`;

  // Total Cleanup of old session
  if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
  mount.innerHTML = ''; 

  currentBlobUrl = URL.createObjectURL(game.file);

  // Create an isolated sandbox iframe
  const iframe = document.createElement('iframe');
  iframe.style.width = '100%';
  iframe.style.height = '100%';
  iframe.style.border = 'none';
  iframe.allow = "gamepad; autoplay";
  mount.appendChild(iframe);

  // Write the emulator directly into the sandboxed iframe
  const iframeDoc = iframe.contentWindow.document;
  iframeDoc.open();
  iframeDoc.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <style>body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }</style>
    </head>
    <body>
      <div id="ejs-player" style="width:100%; height:100%;"></div>
      <script>
        window.EJS_player = '#ejs-player';
        window.EJS_core = 'n64';
        window.EJS_gameUrl = '${currentBlobUrl}';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_startOnLoaded = true;
        window.EJS_defaultOptions = { 'save-state-slot': 1, 'rewind': false };

        window.EJS_controllerMapping = {
          0: {
            0: { key: 90, name: 'A' }, 1: { key: 88, name: 'B' }, 2: { key: 67, name: 'Z' }, 3: { key: 13, name: 'Start' },
            4: { key: 38, name: 'Up' }, 5: { key: 40, name: 'Down' }, 6: { key: 37, name: 'Left' }, 7: { key: 39, name: 'Right' },
            8: { key: 65, name: 'L' }, 9: { key: 83, name: 'R' },
            10: { key: 49, name: 'C-Up' }, 11: { key: 50, name: 'C-Down' }, 12: { key: 51, name: 'C-Left' }, 13: { key: 52, name: 'C-Right' },
            14: { key: 87, name: 'Analog Up', value: -1.0 }, 15: { key: 83, name: 'Analog Down', value: 1.0 },
            16: { key: 65, name: 'Analog Left', value: -1.0 }, 17: { key: 68, name: 'Analog Right', value: 1.0 }
          }
        };

        window.EJS_settings = {
          'n64-analog-deadzone': '0',
          'n64-analog-sensitivity': '100',
          'n64-cpucore': 'dynamic_recompiler',
          'n64-CountPerOp': '1',
          'n64-astick-sensitivity': '100'
        };

        window.EJS_onGameStart = () => {
          // Send message to parent window to drop the loading screen
          window.parent.postMessage('emu-started', '*');
          
          try {
            if (window.EJS_emulator && window.EJS_emulator.gameManager) {
              window.EJS_emulator.gameManager.setCoreOption('n64-analog-deadzone', '0');
              window.EJS_emulator.gameManager.setCoreOption('n64-astick-sensitivity', '100');
            }
          } catch(e) {}
        };

        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        document.body.appendChild(script);
      <\/script>
    </body>
    </html>
  `);
  iframeDoc.close();
}

function closeEmu() {
  document.getElementById('emu-screen').classList.remove('active');
  setTimeout(() => {
    // Because the emulator is in an iframe, wiping innerHTML completely destroys it from memory!
    document.getElementById('game-mount').innerHTML = '';
  }, 400);
  if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
}
</script>
</body>
</html>
